<!--********ASIDE TAG********
PURPOSE= conatin sidebar or supplementary content
SEMANTIC=incidates content tangentially realted to the main content
NOT CRUCIAL= content is not essential to understanding the main
EXAMPLE=could hold widgets,quets or ads

-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aside tags</title>
</head>
<body>
    <main>
        <aside>
            <h3>Recommended Books</h3>
                <ul>
                    <li> "Introduction to Algorithm"</li>
                    <li>"Learn Python the Hard way "</li>
                </ul>
            
        </aside>
    </main>
</body>
</html>
