<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATHS Equations</title>
</head>
<body>
    <p>
        (a+b)2=a2+b2+2ab
    </p>
    <p>
        (a+b)<sup>2</sup>=a<sup>2</sup>+b<sup>2</sup>+2ab
    </p>
    <p>
        CH4+02=> H20+CO2
    </p>
    <p>
         CH<sub>4</sub>+ 0<sub>2</sub> => H<sub>2</sub>0 + CO <sub>2</sub>
    </p>
</body>
</html>
<!--
<sup>= makes text superscript
<sub> makes text subscript
used for mathematical equations footnotes
does not changes font size
-->
