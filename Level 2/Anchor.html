<!-- ANCHOR TAG <a></a> 
 used for creating hyperlinks
 requires href attribute foe url
 cal link to external site or internal pages
 supports targets attribute to controls link behavior
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor tag</title>
</head>
<body>
    <a href="https://sarkariresult.com.cm/">Sarkari result</a><br>
    <a href="https://www.google.com/" target="_blank"> Google</a><br>
    <a href="https://www.flipkart.com/">flipcart</a>
</body>
</html>
