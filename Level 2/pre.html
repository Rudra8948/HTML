<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRE TAG </title>
</head>
<body>
    <p>
     Dear sir

     thooo.


    thank You

    </p>

    <pre>
     Dear sir

     thooo.


    thank You

    </pre>
</body>
</html>

<!--
PRESERVES TEXT FORMATTING
MAINTAINS WHITESPACE AND LINE BREAKS
USEFUL FOR DISPLAYING CODE 
ENCLOED WITHIN <pre> and </pre> tags

-->>
